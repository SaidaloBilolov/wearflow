<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearFlow Logistics — Kirish</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">

        <!-- Logotip va sarlavha -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
                <!-- Oddiy SVG ikonka -->
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">Saida'lo Bilolov</h1>
            <p class="text-slate-400 mt-1">Logistics Boshqaruv Tizimi</p>
        </div>

        <!-- Login kartasi -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
            <h2 class="text-xl font-semibold text-white mb-6">Tizimga kirish</h2>

            <!-- Xato xabari (faqat xato bo'lganda ko'rinadi) -->
            <div th:if="${xato}" class="bg-red-900/50 border border-red-500 text-red-300 rounded-lg p-3 mb-5 text-sm">
                <span th:text="${xato}"></span>
            </div>

            <!-- Login formasi -->
            <form th:action="@{/login}" method="post" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">
                        Foydalanuvchi nomi
                    </label>
                    <input type="text"
                           name="username"
                           placeholder="username kiriting"
                           required
                           class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-3
                                  placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1
                                  focus:ring-blue-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">
                        Parol
                    </label>
                    <input type="password"
                           name="password"
                           placeholder="••••••••"
                           required
                           class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-3
                                  placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1
                                  focus:ring-blue-500 transition">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg
                               transition duration-200 mt-2">
                    Kirish →
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 text-sm mt-6">
            © 2025 WearFlow Logistics. Barcha huquqlar himoyalangan.
        </p>
    </div>

</body>
</html>
