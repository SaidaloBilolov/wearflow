# Server porti (Render muhitida PORT o'zgaruvchisidan oladi, aks holda 8080)
server.port=${PORT:8080}

# --- Ma'lumotlar Bazasi Sozlamalari (Neon.tech) ---
# DATABASE_URL ni Render.com'da Environment Variable sifatida belgilaysiz
# Format: jdbc:postgresql://<host>/<dbname>?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Sozlamalari ---
# "update" - jadvallar yo'q bo'lsa yaratadi, bor bo'lsa o'zgartirmaydi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
